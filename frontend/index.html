<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduVoice AI — Conversational Voice Tutor</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <main class="container">
    <header class="hero">
      <div class="badge">Murf Falcon + Gemini</div>
      <h1 class="title">Edu<span class="accent">Voice</span> AI</h1>
      <p class="subtitle">A professional conversational voice tutor for fast concept learning.</p>
    </header>

    <section class="card" id="app-card">
      <div class="controls-row">
        <div class="field-group">
          <label for="personality-select" class="field-label"><span class="step-num">01</span>Tutor Personality</label>
          <div class="select-wrapper">
            <select id="personality-select" class="select">
              <option value="professor">🎓 Professor</option>
              <option value="friendly">😊 Friendly Tutor</option>
              <option value="assistant">🤖 AI Assistant</option>
            </select>
            <span class="select-arrow">▾</span>
          </div>
        </div>
      </div>

      <section>
        <label class="field-label"><span class="step-num">02</span>Topic Suggestions</label>
        <div class="suggestions" id="topic-suggestions">
          <button class="suggestion-chip" data-topic="Artificial Intelligence">Artificial Intelligence</button>
          <button class="suggestion-chip" data-topic="Photosynthesis">Photosynthesis</button>
          <button class="suggestion-chip" data-topic="Black Holes">Black Holes</button>
          <button class="suggestion-chip" data-topic="Climate Change">Climate Change</button>
        </div>
      </section>

      <section>
        <label class="field-label" for="chat-input"><span class="step-num">03</span>Ask Your Tutor</label>
        <div class="input-row">
          <textarea id="chat-input" class="textarea" rows="3" maxlength="500" placeholder="Try: Explain gravity in simple words"></textarea>
          <button id="mic-btn" class="mic-btn" type="button" aria-label="Start voice input">
            <span class="mic-icon">🎤</span>
            <span class="mic-ripple" aria-hidden="true"></span>
          </button>
        </div>
        <div class="input-actions">
          <div id="char-count" class="char-counter">0 / 500</div>
          <button id="send-btn" class="generate-btn" type="button">
            <span class="btn-icon">➤</span>
            <span class="btn-text">Ask Tutor</span>
            <span id="spinner" class="spinner" hidden></span>
          </button>
        </div>
      </section>

      <div id="status-msg" class="status-msg" hidden></div>

      <section>
        <label class="field-label"><span class="step-num">04</span>Conversation</label>
        <div id="chat-container" class="chat-container" aria-live="polite"></div>
      </section>
    </section>

    <footer class="footer">Built for hackathon demo · Murf Falcon voice + Gemini tutoring + live conversation memory</footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
